<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar pacientes</title>
</head>
<body>
    <h1>Pacientes</h1>

    <a href="/createPacientes">Cadastrar paciente</a>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Idade</th>
                <th>Peso</th>
                <th>Tipo de Sangue</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Nome}}</td>
                <td>{{.CPF}}</td>
                <td>{{.Idade}}</td>
                <td>{{.Peso}}</td>
                <td>{{.TipoSangue}}</td>
                <td>
                    <a href="/updatePacientes?id={{.ID}}">Editar</a>
                    <a href="/deletePacientes?id={{.ID}}">Excluir</a>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>

    <a href="/">Voltar</a>
</body>
</html>
