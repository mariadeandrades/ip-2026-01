<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar paciente</title>
</head>
<body>
    <h1>Atualizar paciente</h1>

    <form action="/updatePacientes" method="POST">
        <input type="hidden" name="id" value="{{.ID}}">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{.Nome}}" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" value="{{.CPF}}" required>

        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade" value="{{.Idade}}" required>

        <label for="peso">Peso</label>
        <input type="number" id="peso" name="peso" value="{{.Peso}}" step="0.1" required>

        <label for="tipo_sangue">Tipo de Sangue</label>
        <input type="text" id="tipo_sangue" name="tipo_sangue" value="{{.TipoSangue}}" required>

        <label for="sintomas">Sintomas</label>
        <textarea id="sintomas" name="sintomas">{{.Sintomas}}</textarea>

        <label for="diagnostico">Diagnóstico</label>
        <textarea id="diagnostico" name="diagnostico">{{.Diagnostico}}</textarea>

        <button type="submit">Atualizar</button>
    </form>

    <a href="/pacientes">Voltar</a>
</body>
</html>
